<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Men haqimda </title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        img {
            border-radius: 50%;
            border: 5px solid #6c5ce7;
            object-fit: cover;
        }
        h1 { color: #6c5ce7; }
        .bio { font-style: italic; color: #666; }
        .skills {
            text-align: left;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="my-image.jpg" alt="Muslimbek Mullajanov" width="150" height="150">

        <h1>Muslimbek Mullajanov</h1>
        <p class="bio">Kelajakda kuchli Frontend Developer</p>
        <hr>
        
        <h3>Men haqimda:</h3>
        <p>Sirdaryo viloyati,Oqoltin tumani Andijon MFY qishlogidanman. Dasturlashga va texnologiyalarga juda qiziqaman.</p>

        <h3>Qiziqishlarim:</h3>
        <div class="skills">
            <ul>
                <li>Kompyuter oyinlari o'ynash</li>
                <li>Minecraft PE</li>
                <li>Python va HTML o'rganish</li>
            </ul>
        </div>
    </div>

</body>
</html>
